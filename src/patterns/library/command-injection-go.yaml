id: command-injection-go
language: go
severity: critical
owaspCategory: A03
description: exec.Command() with string concatenation — command injection vector
fixHint: Use exec.Command() with separate arguments (never shell=true). Validate all inputs.
rule:
  any:
    - kind: call_expression
      all:
        - has:
            kind: selector_expression
            regex: '^exec\.Command$'
        - has:
            kind: argument_list
            has:
              kind: binary_expression
    - kind: call_expression
      all:
        - has:
            kind: selector_expression
            regex: '^exec\.Command$'
        - has:
            kind: argument_list
            has:
              kind: call_expression
              has:
                kind: selector_expression
                regex: '^fmt\.Sprintf$'
