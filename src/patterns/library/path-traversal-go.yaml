id: path-traversal-go
language: go
severity: high
owaspCategory: A01
description: os.Open() or ioutil.ReadFile() with user-controlled path — path traversal vector
fixHint: Use filepath.Clean() and verify the result is within an allowed base directory.
rule:
  kind: call_expression
  has:
    kind: selector_expression
    regex: '^(os\.Open|ioutil\.ReadFile|os\.ReadFile)$'
